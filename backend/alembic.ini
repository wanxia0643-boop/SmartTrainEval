# Alembic 配置文件
# 数据库连接串在 alembic/env.py 中由 app.core.config.settings 动态注入，
# 故此处不写死 sqlalchemy.url。

[alembic]
script_location = alembic
prepend_sys_path = .
# 迁移脚本文件名带时间戳，便于排序
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# 使用本地时区生成时间戳
timezone =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
